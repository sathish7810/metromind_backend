spring.datasource.url=jdbc:mysql://localhost:3306/metromind_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=dbms

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

metromind.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-at-least-32-bytes}
metromind.jwt.expiration-ms=86400000

server.error.include-message=always
server.port=8081